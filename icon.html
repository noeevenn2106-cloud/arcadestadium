<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Générateur d'icône</title>
    <style>
        body { background-color: #0b111e; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { width: 512px; height: 512px; background-color: #070b14; border-radius: 64px; display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body>
    <div class="box">
        <svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
            <circle cx="350" cy="160" r="70" fill="#ec4899" opacity="0.15" />
            <circle cx="350" cy="160" r="45" fill="#ec4899" opacity="0.3" />
            <circle cx="350" cy="160" r="24" fill="#ec4899" />
            <path d="M 100,390 Q 160,320 220,340 T 360,240" fill="none" stroke="#38bdf8" stroke-width="16" stroke-linecap="round" />
            <g transform="translate(360, 240) rotate(-35)"><ellipse cx="0" cy="0" rx="34" ry="22" fill="#ffffff" /></g>
        </svg>
    </div>

</html>
